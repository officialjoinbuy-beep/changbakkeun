<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --navy:#0B1220;
    --navy-2:#111B2E;
    --board:#0E1626;
    --amber:#F2C230;
    --amber-dim:#8C6E1E;
    --ivory:#EDEBE3;
    --muted:#7C8AA0;
    --teal:#3A7CA5;
    --split-line: rgba(255,255,255,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--navy);color:var(--ivory);
    font-family:'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    -webkit-font-smoothing:antialiased;}
  .mono{font-family:'Space Mono', monospace;}

  .wrap{max-width:720px;margin:0 auto;padding:28px 18px 60px;}

  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:11px;letter-spacing:.18em;color:var(--amber);
    text-transform:uppercase;margin-bottom:6px;
  }
  h1{font-size:24px;margin:0 0 8px;font-weight:700;letter-spacing:-.01em;}
  .sub{color:var(--muted);font-size:13px;margin:0 0 32px;line-height:1.6;}

  .directory{
    border-top:1px solid var(--split-line);
  }
  .entry{
    display:flex;align-items:center;gap:16px;
    padding:18px 4px;border-bottom:1px solid var(--split-line);
    text-decoration:none;color:inherit;
    transition:background .15s;
  }
  a.entry{cursor:pointer;}
  a.entry:hover{background:var(--navy-2);}
  .entry.disabled{opacity:.45;}

  .entry-idx{
    font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);
    flex:0 0 auto;width:28px;
  }
  .entry-body{flex:1;min-width:0;}
  .entry-name{font-size:16px;font-weight:700;margin-bottom:3px;}
  .entry-desc{font-size:12px;color:var(--muted);line-height:1.5;}
  .entry-status{
    flex:0 0 auto;font-family:'Space Mono',monospace;font-size:10px;
    letter-spacing:.08em;padding:4px 9px;border-radius:999px;
    text-transform:uppercase;white-space:nowrap;
  }
  .entry-status.open{background:rgba(242,194,48,0.12);color:var(--amber);border:1px solid var(--amber-dim);}
  .entry-status.soon{background:transparent;color:var(--muted);border:1px solid var(--split-line);}

  footer{margin-top:40px;font-size:11px;color:var(--muted);text-align:center;line-height:1.7;}
</style>
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5364478364167025"
  crossorigin="anonymous"></script>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-48ZPXHK87T"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-48ZPXHK87T');
</script>
</head>
<body>
<div class="wrap">

  <div class="eyebrow">ZEROSEARCH</div>
  <h1>검색 대신, 바로 쓰는 도구</h1>
  <p class="sub">필요할 때마다 검색해서 찾아 헤매는 대신, 여기 모아둔 도구를 바로 씁니다.</p>

  <div class="directory" id="directory">
    <a class="entry" href="./weather/" data-tool="weather">
      <div class="entry-idx mono">001</div>
      <div class="entry-body">
        <div class="entry-name">창밖은</div>
        <div class="entry-desc">여행지 날씨와 근처 웹캠, 짐 체크리스트까지 한 번에</div>
      </div>
      <div class="entry-status open mono">OPEN</div>
    </a>

    <div class="entry disabled">
      <div class="entry-idx mono">002</div>
      <div class="entry-body">
        <div class="entry-name">등기부등본분석</div>
        <div class="entry-desc">전세·매매 계약 전, 등기부등본에서 위험 요소를 확인</div>
      </div>
      <div class="entry-status soon mono">준비중</div>
    </div>

    <div class="entry disabled">
      <div class="entry-idx mono">003</div>
      <div class="entry-body">
        <div class="entry-name">노후자금계산기</div>
        <div class="entry-desc">은퇴 후 자산이 언제까지 버티는지 미리 계산</div>
      </div>
      <div class="entry-status soon mono">준비중</div>
    </div>
  </div>

  <footer>
    제로서치 (ZEROSEARCH)<br>
    실생활에 바로 쓰는 무료 웹 도구 모음
  </footer>
</div>

<script>
  document.querySelectorAll('a.entry').forEach(el => {
    el.addEventListener('click', () => {
      if (typeof gtag === 'function') {
        gtag('event', 'tool_open', { tool_name: el.dataset.tool });
      }
    });
  });
</script>
</body>
</html>
